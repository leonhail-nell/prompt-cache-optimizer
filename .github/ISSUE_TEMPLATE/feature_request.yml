name: Feature request
description: Propose a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the situation where the current API falls short. Concrete examples are most useful.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? A code snippet showing the desired API helps a lot.
      render: ts

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: What workarounds or other libraries have you tried?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have"
        - "Would unblock my use case"
        - "Critical — I can't use the package without it"
